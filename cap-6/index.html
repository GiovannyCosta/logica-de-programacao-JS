<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Capítulo 5 - Estruturas de Repetição</title>
</head>

<body>

    <h1 class="topTitle">Capítulo 5: Loops e Repetições</h1>
    <main class="container">
        <section class="card">
            <h2>Consultório odontológico</h2>
            <form id="formOdonto">
                <div class="input-group">
                    <label for="inputOdonto">Paciente:</label>
                    <input type="text" id="inputOdonto" required>
                </div>
                <button type="submit">Adicionar</button>
                <button type="submit" id="btnUrgente">Urgência</button>
                <button type="submit" id="btnAtender"> Atender</button>

            </form>
            <p>Paciente em atendimento: <span id="pacienteAtendimento"></span></p>
            <output id="FilaPacientes" class="resultado filaPacientes"></output>
        </section>

    </main>

    <script src="./modulo.js"></script>
</body>

</html>
